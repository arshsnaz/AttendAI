# Load local environment values if present
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Server properties
server.port=${PORT:8082}
server.servlet.context-path=/
# MySQL Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:attendai_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:Abubakar@2589}}
# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

# Flyway Migration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=attendai_db
spring.flyway.placeholders.engine=innodb
# JWT Secret config (for production use strongly random string)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
# File Storage Properties (For OpenCV datasets)
dataset.directory=${DATASET_DIRECTORY:uploads/datasets}
app.upload.student-dir=${STUDENT_IMAGE_DIR:uploads/students}
