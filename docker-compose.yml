  nginx:
    image: nginx:alpine
    container_name: attendai-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    restart: always
version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: attendai-mysql
    restart: always
    environment:
      MYSQL_DATABASE: attendai_db
      MYSQL_ROOT_PASSWORD: Abubakar@2589
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: attendai-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/attendai_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Abubakar@2589
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8082:8082"
    volumes:
      - ./backend/target:/app
    command: ["java", "-jar", "app.jar"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendai-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production

volumes:
  db_data:
